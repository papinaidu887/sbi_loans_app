<!DOCTYPE html>
<html>
<head>
    <title>Naidu Tech</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        .post {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        button {
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>Naidu Tech Blog</h1>

<button id="loadPost">Load Post</button>

<div id="posts"></div>

<script>
$(document).ready(function () {
    $("#loadPost").click(function () {
        $("#posts").append(`
            <div class="post">
                <h2>My First Blog</h2>
                <p>Date: March 2026</p>
                <p>This is my first blog website using index.html and jQuery.</p>
            </div>
        `);
    });
});
</script>

</body>
</html>
